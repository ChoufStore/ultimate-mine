<!DOCTYPE html>
<html>
<head>
    <title>ultimate-mine</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-align: center;
            padding: 50px;
            margin: 0;
            min-height: 100vh;
        }
        h1 {
            font-size: 3em;
            margin-bottom: 20px;
        }
        .products {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .product {
            background: white;
            color: #333;
            padding: 20px;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <h1>🇲🇦 Welcome to ultimate-mine</h1>
    <div class="products" id="products">
        <p>Loading products...</p>
    </div>
    
    <script>
        fetch('https://firestore.googleapis.com/v1/projects/choufstore-1a66b/databases/(default)/documents/stores/ultimate-mine/products')
            .then(response => response.json())
            .then(data => {
                const container = document.getElementById('products');
                if (data.documents && data.documents.length > 0) {
                    let html = '';
                    data.documents.forEach(doc => {
                        const fields = doc.fields || {};
                        html += `
                            <div class="product">
                                <h3>${fields.name?.stringValue || 'Product'}</h3>
                                <p>${fields.price?.integerValue || '0'} MAD</p>
                            </div>
                        `;
                    });
                    container.innerHTML = html;
                } else {
                    container.innerHTML = '<p>No products yet</p>';
                }
            });
    </script>
</body>
</html>
